<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pinpoint</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080a0d;
    --surface: #0e1218;
    --border: #1c2330;
    --border-bright: #2a3545;
    --text: #c8d4e0;
    --muted: #4a5a6a;
    --accent: #e8f040;
    --accent-dim: rgba(232, 240, 64, 0.12);
    --accent-glow: rgba(232, 240, 64, 0.25);
    --red: #ff4a4a;
    --red-dim: rgba(255, 74, 74, 0.15);
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    -webkit-font-smoothing: antialiased;
  }

  /* ── MAP ── */
  #map {
    position: fixed;
    inset: 0;
    background: var(--bg);
  }

  #map canvas, #map > div {
    filter: brightness(0.85) saturate(0.5) hue-rotate(200deg);
  }

  /* Leaflet dark override */
  .leaflet-tile { filter: brightness(0.3) saturate(0.4) invert(1) hue-rotate(200deg) contrast(0.9); }
  .leaflet-container { background: var(--bg) !important; }
  .leaflet-control-zoom { display: none; }
  .leaflet-control-attribution { display: none; }

  /* ── HEADER ── */
  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 18px 20px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(to bottom, rgba(8,10,13,0.98), transparent);
    pointer-events: none;
  }

  #logo {
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
  }

  #status-pill {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 5px 10px;
    border-radius: 20px;
    pointer-events: auto;
    transition: all 0.3s;
  }

  #status-pill.active {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  /* ── COMPASS OVERLAY (shown when pin is set) ── */
  #compass-overlay {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
  }

  #compass-overlay.visible { opacity: 1; }

  #compass-ring {
    width: 200px;
    height: 200px;
    position: relative;
    margin-bottom: 24px;
  }

  #compass-svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 20px var(--accent-glow));
  }

  #arrow-group {
    transform-origin: center;
    transition: transform 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  #distance-label {
    font-family: 'Syne', sans-serif;
    font-size: 38px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1;
    text-align: center;
  }

  #distance-unit {
    font-size: 13px;
    font-weight: 400;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 4px;
    text-align: center;
  }

  /* ── BOTTOM PANEL ── */
  #bottom {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 100;
    padding: 0 16px 32px;
  }

  #info-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.4s, transform 0.4s;
  }

  #info-row.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .info-box {
    flex: 1;
    background: rgba(14, 18, 24, 0.92);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    backdrop-filter: blur(12px);
  }

  .info-label {
    font-size: 8px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .info-value {
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
  }

  #btn-row {
    display: flex;
    gap: 10px;
  }

  .btn {
    flex: 1;
    height: 54px;
    border: none;
    border-radius: 12px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  #btn-pin {
    background: var(--accent);
    color: #080a0d;
    font-weight: 700;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    letter-spacing: 0.06em;
  }

  #btn-pin:active { transform: scale(0.97); background: #d0d838; }

  #btn-clear {
    background: var(--red-dim);
    border: 1px solid var(--red);
    color: var(--red);
    display: none;
  }

  #btn-clear:active { transform: scale(0.97); background: rgba(255,74,74,0.25); }
  #btn-clear.show { display: block; flex: 0 0 54px; width: 54px; }

  /* ── LOCATE FAB ── */
  #btn-locate {
    position: fixed;
    right: 16px;
    bottom: 110px;
    width: 46px;
    height: 46px;
    background: rgba(14, 18, 24, 0.92);
    border: 1px solid var(--border-bright);
    border-radius: 50%;
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(12px);
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  #btn-locate:active { transform: scale(0.92); border-color: var(--accent); color: var(--accent); }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    top: 72px;
    left: 50%;
    transform: translateX(-50%) translateY(-10px);
    background: rgba(14, 18, 24, 0.96);
    border: 1px solid var(--border-bright);
    color: var(--text);
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 10px 18px;
    border-radius: 20px;
    backdrop-filter: blur(12px);
    z-index: 200;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    white-space: nowrap;
    pointer-events: none;
  }

  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── SPLASH ── */
  #splash {
    position: fixed;
    inset: 0;
    z-index: 300;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    transition: opacity 0.6s;
  }

  #splash.hidden { opacity: 0; pointer-events: none; }

  #splash-icon {
    font-size: 48px;
    margin-bottom: 8px;
  }

  #splash h1 {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  #splash p {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    text-align: center;
    line-height: 1.8;
    max-width: 240px;
  }

  #splash-btn {
    margin-top: 16px;
    background: var(--accent);
    color: #080a0d;
    border: none;
    border-radius: 10px;
    padding: 14px 36px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  #splash-btn:active { transform: scale(0.96); }

  /* ── NO-GPS state ── */
  #no-gps {
    position: fixed;
    inset: 0;
    z-index: 90;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    display: none;
  }

  #no-gps.show { display: flex; }

  #no-gps p {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-align: center;
  }

  /* Pulse ring on user location */
  .user-dot {
    width: 16px;
    height: 16px;
    background: var(--accent);
    border-radius: 50%;
    border: 2px solid #080a0d;
    box-shadow: 0 0 0 0 var(--accent-glow);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 var(--accent-glow); }
    70% { box-shadow: 0 0 0 14px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }

  /* Pin marker */
  .pin-marker {
    width: 12px;
    height: 12px;
    background: var(--red);
    border-radius: 50%;
    border: 2px solid #080a0d;
    box-shadow: 0 0 0 3px rgba(255,74,74,0.3);
  }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div id="splash-icon">📍</div>
  <h1>Pinpoint</h1>
  <p>Drop a pin.<br>Find your way back.<br>No account. No data. Offline.</p>
  <button id="splash-btn">Enable Location</button>
</div>

<!-- HEADER -->
<div id="header">
  <div id="logo">Pinpoint</div>
  <div id="status-pill">Locating…</div>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- COMPASS OVERLAY -->
<div id="compass-overlay">
  <div id="compass-ring">
    <svg id="compass-svg" viewBox="0 0 200 200">
      <!-- Outer ring -->
      <circle cx="100" cy="100" r="92" fill="none" stroke="#1c2330" stroke-width="1.5"/>
      <!-- Tick marks -->
      <g stroke="#2a3545" stroke-width="1">
        <line x1="100" y1="10" x2="100" y2="22"/>
        <line x1="100" y1="178" x2="100" y2="190"/>
        <line x1="10" y1="100" x2="22" y2="100"/>
        <line x1="178" y1="100" x2="190" y2="100"/>
        <!-- 8 smaller ticks -->
        <line x1="156" y1="20" x2="151" y2="31" transform="rotate(45 100 100)"/>
        <line x1="156" y1="20" x2="151" y2="31" transform="rotate(90 100 100)"/>
        <line x1="156" y1="20" x2="151" y2="31" transform="rotate(135 100 100)"/>
        <line x1="156" y1="20" x2="151" y2="31" transform="rotate(180 100 100)"/>
        <line x1="156" y1="20" x2="151" y2="31" transform="rotate(225 100 100)"/>
        <line x1="156" y1="20" x2="151" y2="31" transform="rotate(270 100 100)"/>
        <line x1="156" y1="20" x2="151" y2="31" transform="rotate(315 100 100)"/>
      </g>
      <!-- Cardinal letters -->
      <text x="100" y="8" text-anchor="middle" fill="#e8f040" font-family="Syne,sans-serif" font-size="10" font-weight="700">N</text>
      <text x="100" y="198" text-anchor="middle" fill="#4a5a6a" font-family="Syne,sans-serif" font-size="10" font-weight="400">S</text>
      <text x="6" y="104" text-anchor="middle" fill="#4a5a6a" font-family="Syne,sans-serif" font-size="10" font-weight="400">W</text>
      <text x="194" y="104" text-anchor="middle" fill="#4a5a6a" font-family="Syne,sans-serif" font-size="10" font-weight="400">E</text>
      <!-- Inner circle -->
      <circle cx="100" cy="100" r="66" fill="rgba(14,18,24,0.7)" stroke="#1c2330" stroke-width="1"/>
      <!-- Arrow group (rotates) -->
      <g id="arrow-group">
        <!-- Arrow pointing up (toward pin) -->
        <polygon points="100,38 107,72 100,65 93,72" fill="#e8f040" opacity="0.95"/>
        <!-- Tail -->
        <polygon points="100,162 107,128 100,135 93,128" fill="#2a3545"/>
        <!-- Center dot -->
        <circle cx="100" cy="100" r="5" fill="#080a0d" stroke="#e8f040" stroke-width="1.5"/>
      </g>
    </svg>
  </div>
  <div id="distance-label">—</div>
  <div id="distance-unit">meters to pin</div>
</div>

<!-- NO GPS -->
<div id="no-gps">
  <p>⚠ Location unavailable<br>Check permissions</p>
</div>

<!-- LOCATE FAB -->
<button id="btn-locate" title="Center on me">◎</button>

<!-- BOTTOM -->
<div id="bottom">
  <div id="info-row">
    <div class="info-box">
      <div class="info-label">Bearing</div>
      <div class="info-value" id="val-bearing">—°</div>
    </div>
    <div class="info-box">
      <div class="info-label">Accuracy</div>
      <div class="info-value" id="val-accuracy">—m</div>
    </div>
    <div class="info-box">
      <div class="info-label">Pin set</div>
      <div class="info-value" id="val-time">—</div>
    </div>
  </div>
  <div id="btn-row">
    <button class="btn" id="btn-pin">Drop Pin Here</button>
    <button class="btn" id="btn-clear">✕</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ── STATE ──
let map, userMarker, pinMarker;
let userPos = null;
let pinPos = null;
let heading = 0; // device heading
let watchId = null;
let arrowDeg = 0;

// Load saved pin
const saved = localStorage.getItem('pinpoint_pin');
if (saved) {
  try { pinPos = JSON.parse(saved); } catch(e) {}
}

// ── MAP INIT ──
function initMap() {
  map = L.map('map', {
    zoomControl: false,
    attributionControl: false,
    center: [20, 0],
    zoom: 2,
    preferCanvas: true
  });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map);
}

// ── MARKERS ──
function makeUserMarker(latlng) {
  const el = document.createElement('div');
  el.className = 'user-dot';
  return L.marker(latlng, {
    icon: L.divIcon({ className: '', html: el, iconSize: [16,16], iconAnchor: [8,8] }),
    zIndexOffset: 1000,
    interactive: false
  });
}

function makePinMarker(latlng) {
  const el = document.createElement('div');
  el.className = 'pin-marker';
  return L.marker(latlng, {
    icon: L.divIcon({ className: '', html: el, iconSize: [12,12], iconAnchor: [6,6] }),
    zIndexOffset: 500,
    interactive: false
  });
}

// ── GEO WATCH ──
function startWatch() {
  if (!navigator.geolocation) {
    document.getElementById('no-gps').classList.add('show');
    return;
  }

  watchId = navigator.geolocation.watchPosition(onPos, onErr, {
    enableHighAccuracy: true,
    maximumAge: 2000,
    timeout: 15000
  });
}

function onPos(pos) {
  const { latitude: lat, longitude: lng, accuracy, heading: h } = pos.coords;
  userPos = { lat, lng };

  // Device heading
  if (h !== null && !isNaN(h)) heading = h;

  // Update pill
  const pill = document.getElementById('status-pill');
  pill.textContent = 'Live';
  pill.classList.add('active');

  // Update accuracy
  document.getElementById('val-accuracy').textContent = Math.round(accuracy) + 'm';

  // User marker
  const latlng = [lat, lng];
  if (!userMarker) {
    userMarker = makeUserMarker(latlng).addTo(map);
    map.setView(latlng, 16, { animate: true });
  } else {
    userMarker.setLatLng(latlng);
  }

  // If pin exists, draw line / arrow
  if (pinPos) updateCompass();

  document.getElementById('no-gps').classList.remove('show');
}

function onErr(e) {
  document.getElementById('status-pill').textContent = 'No GPS';
  document.getElementById('no-gps').classList.add('show');
}

// ── COMPASS LOGIC ──
function toRad(d) { return d * Math.PI / 180; }
function toDeg(r) { return r * 180 / Math.PI; }

function bearing(from, to) {
  const φ1 = toRad(from.lat), φ2 = toRad(to.lat);
  const Δλ = toRad(to.lng - from.lng);
  const y = Math.sin(Δλ) * Math.cos(φ2);
  const x = Math.cos(φ1)*Math.sin(φ2) - Math.sin(φ1)*Math.cos(φ2)*Math.cos(Δλ);
  return (toDeg(Math.atan2(y, x)) + 360) % 360;
}

function haversine(a, b) {
  const R = 6371000;
  const φ1 = toRad(a.lat), φ2 = toRad(b.lat);
  const Δφ = toRad(b.lat - a.lat), Δλ = toRad(b.lng - a.lng);
  const s = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1-s));
}

function formatDist(m) {
  if (m >= 1000) return [(m/1000).toFixed(2), 'km to pin'];
  return [Math.round(m).toString(), 'meters to pin'];
}

function updateCompass() {
  if (!userPos || !pinPos) return;
  const b = bearing(userPos, pinPos);
  const dist = haversine(userPos, pinPos);
  const relBearing = (b - heading + 360) % 360;

  // Rotate arrow
  const ag = document.getElementById('arrow-group');
  ag.setAttribute('transform', `rotate(${relBearing}, 100, 100)`);

  // Distance
  const [val, unit] = formatDist(dist);
  document.getElementById('distance-label').textContent = val;
  document.getElementById('distance-unit').textContent = unit;

  // Bearing label
  document.getElementById('val-bearing').textContent = Math.round(b) + '°';
}

// ── DEVICE ORIENTATION ──
function requestOrientation() {
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().then(state => {
      if (state === 'granted') window.addEventListener('deviceorientationabsolute', onOrient, true);
    }).catch(() => {});
  } else {
    window.addEventListener('deviceorientationabsolute', onOrient, true);
    window.addEventListener('deviceorientation', onOrient, true);
  }
}

function onOrient(e) {
  if (e.absolute && e.alpha !== null) {
    heading = (360 - e.alpha) % 360;
    if (userPos && pinPos) updateCompass();
  }
}

// ── PIN ACTIONS ──
function dropPin() {
  if (!userPos) { showToast('Waiting for location…'); return; }
  pinPos = { ...userPos };
  localStorage.setItem('pinpoint_pin', JSON.stringify(pinPos));

  // Marker
  if (pinMarker) map.removeLayer(pinMarker);
  pinMarker = makePinMarker([pinPos.lat, pinPos.lng]).addTo(map);

  // Time
  const now = new Date();
  document.getElementById('val-time').textContent =
    now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');

  document.getElementById('compass-overlay').classList.add('visible');
  document.getElementById('info-row').classList.add('visible');
  document.getElementById('btn-clear').classList.add('show');

  updateCompass();
  showToast('Pin dropped');
  requestOrientation();
}

function clearPin() {
  pinPos = null;
  localStorage.removeItem('pinpoint_pin');
  if (pinMarker) { map.removeLayer(pinMarker); pinMarker = null; }
  document.getElementById('compass-overlay').classList.remove('visible');
  document.getElementById('info-row').classList.remove('visible');
  document.getElementById('btn-clear').classList.remove('show');
  document.getElementById('distance-label').textContent = '—';
  document.getElementById('distance-unit').textContent = 'meters to pin';
  document.getElementById('val-bearing').textContent = '—°';
  document.getElementById('val-time').textContent = '—';
  showToast('Pin cleared');
}

// ── TOAST ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── SPLASH ──
document.getElementById('splash-btn').addEventListener('click', () => {
  document.getElementById('splash').classList.add('hidden');
  setTimeout(() => document.getElementById('splash').remove(), 700);
  initMap();
  startWatch();
  requestOrientation();

  // Restore saved pin after map ready
  if (pinPos) {
    setTimeout(() => {
      pinMarker = makePinMarker([pinPos.lat, pinPos.lng]).addTo(map);
      document.getElementById('compass-overlay').classList.add('visible');
      document.getElementById('info-row').classList.add('visible');
      document.getElementById('btn-clear').classList.add('show');
      document.getElementById('val-time').textContent = 'Saved';
    }, 600);
  }
});

// ── BUTTONS ──
document.getElementById('btn-pin').addEventListener('click', dropPin);
document.getElementById('btn-clear').addEventListener('click', clearPin);
document.getElementById('btn-locate').addEventListener('click', () => {
  if (userPos) map.setView([userPos.lat, userPos.lng], 17, { animate: true });
  else showToast('No location yet…');
});
</script>
</body>
</html>
