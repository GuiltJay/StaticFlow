<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gallery Viewer</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- JSZip + FileSaver -->
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

<style>
  body { background:#0f0f0f; color:#fff; }
  .header { position:sticky; top:0; background:#151515; z-index:10; }
  #gallery img { cursor:pointer; border-radius:10px; background:#222; }
  .nav-btn {
    position:absolute; top:50%; transform:translateY(-50%);
    background:rgba(0,0,0,.5); color:white; border:none;
    font-size:50px; padding:10px 18px; cursor:pointer; user-select:none;
  }
  .nav-btn.left { left:10px; }
  .nav-btn.right { right:10px; }
</style>
</head>

<body>

<div class="header p-3 d-flex gap-2">
  <input id="gid" class="form-control" placeholder="Enter GID">
  <button class="btn btn-danger" onclick="loadGallery()">Load</button>
  <button class="btn btn-success" onclick="downloadZip()">Download ZIP</button>
</div>

<h3 id="title" class="text-center mt-2"></h3>
<p id="info" class="text-center"></p>

<div id="gallery" class="container-fluid row g-2 p-2"></div>

<!-- Fullscreen Viewer Modal -->
<div class="modal fade" id="viewerModal" tabindex="-1">
  <div class="modal-dialog modal-fullscreen">
    <div class="modal-content bg-black">
      <div class="modal-body p-0 d-flex align-items-center justify-content-center position-relative">
        <button class="nav-btn left" onclick="prevImg()">❮</button>
        <img id="viewerImg" class="img-fluid" draggable="false">
        <button class="nav-btn right" onclick="nextImg()">❯</button>
        <button class="btn-close btn-close-white position-absolute top-0 end-0 m-3"
                data-bs-dismiss="modal"></button>
      </div>
    </div>
  </div>
</div>

<script>
// 🔁 PUT YOUR OWN LEGAL API HERE:
const API_URL = "https://hentai.mrspidyxd.workers.dev/images?gid=";

// Optional CORS proxy if your image host blocks blob fetches:
const PROXY = "https://cors.isomorphic-git.org/"; // uncomment if needed

let currentImages = [];
let currentIndex = 0;

// Load gallery by GID
async function loadGallery() {
  const gid = document.getElementById("gid").value.trim();
  if (!gid) return;

  const gallery = document.getElementById("gallery");
  const title = document.getElementById("title");
  const info = document.getElementById("info");

  gallery.innerHTML = "Loading...";
  title.innerText = "";
  info.innerText = "";

  try {
    const res = await fetch(API_URL + gid);
    const data = await res.json();

    title.innerText = data.title?.pretty || "Gallery";
    info.innerText = `${data.num_pages || (data.image_urls?.length || 0)} pages`;
    currentImages = data.image_urls || [];

    gallery.innerHTML = "";
    currentImages.forEach((url) => {
      const col = document.createElement("div");
      col.className = "col-6 col-sm-4 col-md-3 col-lg-2";

      const img = document.createElement("img");
      img.className = "img-fluid";
      img.loading = "lazy";
      img.src = url;
      img.onclick = () => openViewer(url);

      col.appendChild(img);
      gallery.appendChild(col);
    });
  } catch (e) {
    console.error(e);
    gallery.innerHTML = "Failed to load.";
  }
}

// Viewer controls
function openViewer(url) {
  currentIndex = currentImages.indexOf(url);
  document.getElementById("viewerImg").src = url;
  new bootstrap.Modal(document.getElementById("viewerModal")).show();
}
function showImg(i) {
  if (!currentImages.length) return;
  if (i < 0) i = currentImages.length - 1;
  if (i >= currentImages.length) i = 0;
  currentIndex = i;
  document.getElementById("viewerImg").src = currentImages[i];
}
function nextImg(){ showImg(currentIndex + 1); }
function prevImg(){ showImg(currentIndex - 1); }

// Keyboard arrows
document.addEventListener("keydown", e => {
  const modal = document.getElementById("viewerModal");
  if (!modal.classList.contains("show")) return;
  if (e.key === "ArrowRight") nextImg();
  if (e.key === "ArrowLeft") prevImg();
});

// Mobile swipe
let startX = 0;
document.getElementById("viewerModal").addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});
document.getElementById("viewerModal").addEventListener("touchend", e => {
  const diff = e.changedTouches[0].clientX - startX;
  if (diff > 50) prevImg();
  if (diff < -50) nextImg();
});

// ZIP download (CORS-safe; use PROXY if needed)
async function downloadZip() {
  if (!currentImages.length) return alert("Load a gallery first!");

  const zip = new JSZip();
  const folder = zip.folder("gallery");

  let i = 1;
  for (const url of currentImages) {
    try {
      const fetchUrl = (typeof PROXY !== "undefined") ? PROXY + url : url;
      const blob = await fetch(fetchUrl, { mode: "cors" }).then(r => r.blob());
      folder.file(`${i++}.jpg`, blob);
    } catch (e) {
      console.warn("Skipped:", url);
    }
  }

  const content = await zip.generateAsync({ type: "blob" });
  saveAs(content, "gallery.zip");
}
</script>

</body>
</html>
